name: Parse & Deploy

on:
  # Ежедневно в 8 утра по Москве (5:00 UTC)
  schedule:
    - cron: '0 5 * * *'
  # Ручной запуск
  workflow_dispatch:
  # При пуше в main
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Parse Telegram channels
        run: npx tsx parser/src/index.ts

      - name: Build web
        run: |
          cd web
          npx tsc -b
          npx vite build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
